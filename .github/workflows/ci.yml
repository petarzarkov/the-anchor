name: CI

on:
  workflow_dispatch:
  pull_request:
  push:

jobs:
  frontend:
    runs-on: ubuntu-latest
    name: Frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup
        with:
          setup-rust: 'false'

      - name: Check & Typecheck
        run: bun run --parallel check typecheck

      - name: Build
        run: bun run build

  rust:
    runs-on: ubuntu-latest
    name: Rust Tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup
        with:
          rust-targets: x86_64-unknown-linux-gnu

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Test
        run: cargo test --manifest-path service/Cargo.toml
